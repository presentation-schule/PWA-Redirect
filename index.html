<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>iOS PWA Redirect</title>

  <!-- iOS: Web-App/Standalone-Modus ermöglichen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Redirect" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Standard-PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Icons: lege die PNGs in /icons ab -->
  <link rel="apple-touch-icon" href="icon-180.png" />

  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f7f9; color: #111; }
    main { max-width: 34rem; padding: 2rem; text-align: center; }
    code { background: #e9ebef; padding: .15rem .35rem; border-radius: .35rem; }
    a { color: inherit; }
  </style>
</head>
<body>
  <main id="content">
    <h1>PWA Redirect</h1>
    <p>Öffne diese Seite auf iOS über „Zum Home-Bildschirm“, damit die Weiterleitung startet.</p>
    <p>Im Browser wird nicht weitergeleitet.</p>
  </main>

<script>
const TARGET_URL = "https://example.com";

const isIOSPWA =
  window.navigator.standalone === true ||
  window.matchMedia("(display-mode: standalone)").matches;

if (isIOSPWA) {
  // Öffnet die Zielseite im selben PWA-Fenster
  window.location.replace(TARGET_URL);
}
    function isIOS() {
      // iPadOS kann sich als Mac ausgeben; maxTouchPoints erkennt iPadOS zuverlässig genug.
      return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isStandalonePWA() {
      // iOS-spezifisch laut Apple: true, wenn aus Home-Screen/Standalone gestartet.
      const iosStandalone = window.navigator.standalone === true;

      // Fallback für andere Plattformen / moderne Browser.
      const displayModeStandalone = window.matchMedia &&
        window.matchMedia("(display-mode: standalone)").matches;

      return iosStandalone || displayModeStandalone;
    }

    if (isIOS() && isStandalonePWA()) {
      // replace() verhindert, dass Nutzer per Zurück-Button wieder zur Redirect-Seite kommen.
      window.location.replace(TARGET_URL);
    }
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
